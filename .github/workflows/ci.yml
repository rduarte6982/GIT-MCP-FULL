name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ts-lint-test:
    name: TypeScript lint, type-check, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:test@localhost:5432/postgres
      DATABASE_DIRECT_URL: postgresql://postgres:test@localhost:5432/postgres
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      API_KEY_PEPPER: 0123456789abcdef0123456789abcdef
      EMBEDDER_URL: http://localhost:8080
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: stub
      SUPABASE_SERVICE_ROLE_KEY: stub

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm type-check
      - run: pnpm test

  python-test:
    name: Python ingestion-worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ingestion-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check src tests
      - run: pytest -q
